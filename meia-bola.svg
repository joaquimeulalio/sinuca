<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#2C2C2A">Colisão de meia bola</text>
  <text x="340" y="64" text-anchor="middle" font-size="13" fill="#5F5E5A">colisão elástica, bolas de massa igual — soma sempre 90°</text>

  <line x1="40" y1="200" x2="650" y2="200" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="85" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">linha do tiro</text>

  <line x1="50" y1="200" x2="182" y2="200" stroke="#5F5E5A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="120" y="222" text-anchor="middle" font-size="12" fill="#5F5E5A">branca chega →</text>

  <circle cx="240" cy="200" r="34" fill="#F1EFE8" stroke="#888780" stroke-width="2"/>
  <text x="240" y="205" text-anchor="middle" font-size="12" fill="#5F5E5A">branca</text>

  <circle cx="299" cy="234" r="34" fill="#F5C4B3" stroke="#993C1D" stroke-width="2"/>
  <text x="305" y="239" text-anchor="middle" font-size="12" fill="#993C1D">alvo</text>

  <line x1="240" y1="200" x2="299" y2="234" stroke="#444441" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="238" y="232" text-anchor="end" font-size="12" fill="#444441">linha dos centros</text>

  <line x1="299" y1="234" x2="446" y2="319" stroke="#D85A30" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="454" y="322" text-anchor="start" font-size="14" font-weight="500" fill="#993C1D">alvo → 30°</text>

  <line x1="240" y1="200" x2="368" y2="78" stroke="#185FA5" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="376" y="74" text-anchor="start" font-size="14" font-weight="500" fill="#0C447C">branca → 60°</text>

  <path d="M 300 188 A 60 60 0 0 0 286 154" fill="none" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="312" y="166" text-anchor="middle" font-size="12" fill="#5F5E5A">60°</text>

  <path d="M 350 213 A 55 55 0 0 1 356 245" fill="none" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="366" y="226" text-anchor="middle" font-size="12" fill="#5F5E5A">30°</text>

  <text x="319" y="360" text-anchor="middle" font-size="12" fill="#5F5E5A">meia bola: a borda da branca passa pelo centro da alvo (b = R)</text>
</svg>
