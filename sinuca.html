<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinuca — calculadora do ponto A</title>
<style>
  :root{
    --felt:#0f6e56; --felt-dark:#0a513f; --rail:#5a3a22; --rail-light:#714a2c;
    --line1:#ffd24a; --line2:#ffffff; --obj:#e24b4a; --objb:#a32d2d;
    --ghost:#ffffff; --A:#ffffff; --ink:#23241f; --muted:#73726c;
    --panel:#f4f1ea; --panel-line:#dcd8cc;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#eceae3;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;padding:18px;}
  h1{font-size:20px;font-weight:600;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .wrap{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start;max-width:980px;margin:0 auto}
  .stage{flex:1 1 420px;min-width:320px}
  svg{width:100%;height:auto;display:block;touch-action:none;cursor:default}
  .ball{cursor:grab}
  .ball:active{cursor:grabbing}
  .panel{flex:0 0 260px;background:var(--panel);border:1px solid var(--panel-line);
    border-radius:12px;padding:16px}
  .rightcol{flex:0 0 260px;display:flex;flex-direction:column;gap:14px}
  .rightcol .panel{flex:0 0 auto}
  .panel h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);margin:0 0 10px}
  .row{display:flex;justify-content:space-between;align-items:baseline;
    padding:6px 0;border-bottom:1px solid var(--panel-line);font-size:14px}
  .row:last-child{border-bottom:0}
  .row .v{font-variant-numeric:tabular-nums;font-weight:600}
  .pockets{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:4px 0 14px}
  .pk{border:1px solid var(--panel-line);background:#fff;border-radius:7px;
    padding:8px 4px;font-size:12px;cursor:pointer;text-align:center;color:var(--ink);
    transition:all .12s}
  .pk:hover{border-color:var(--felt)}
  .pk.on{background:var(--felt);color:#fff;border-color:var(--felt)}
  .toggles{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  label.tg{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
  .hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:14px}
  .reset{margin-top:12px;width:100%;padding:9px;border:1px solid var(--felt);
    background:#fff;color:var(--felt);border-radius:8px;font-size:13px;
    font-weight:600;cursor:pointer}
  .reset:hover{background:var(--felt);color:#fff}
  .realbtns{display:flex;gap:8px;margin-top:10px}
  .rbtn{flex:1;padding:7px 6px;border:1px solid var(--felt);background:#fff;
    color:var(--felt);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
  .rbtn:hover{background:var(--felt);color:#fff}
  .calc{font-size:13px;line-height:1.6;color:var(--ink)}
  .calc .step{padding:5px 0;border-bottom:1px solid var(--panel-line)}
  .calc .step:last-child{border-bottom:0}
  .calc .formula{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;
    color:var(--felt);background:#fff;border:1px solid var(--panel-line);
    border-radius:6px;padding:4px 7px;margin-top:5px;display:block;width:fit-content}
  .calc .formula.gen{color:var(--muted);background:transparent;border-style:dashed}
  .calc b{font-weight:600}
</style>
</head>
<body>
  <h1>Calculadora do ponto A</h1>
  <p class="sub">Arraste a bola objeto e a branca. Escolha a caçapa alvo. O ponto A é onde mirar na tabela.</p>
  <div class="wrap">
    <div class="stage">
      <svg id="table" viewBox="0 0 600 760" role="img" aria-label="Mesa de sinuca interativa"></svg>
    </div>
    <div class="rightcol">
    <div class="panel">
      <h2>Caçapa alvo</h2>
      <div class="pockets" id="pockets"></div>
      <h2>Leitura</h2>
      <div class="row"><span>θ₂ (linha 2 × horizontal)</span><span class="v" id="t2">–</span></div>
      <div class="row"><span>Ponto A (fração da tabela)</span><span class="v" id="afrac">–</span></div>
      <div class="row"><span>γ (ângulo de corte)</span><span class="v" id="cut">–</span></div>
      <div class="toggles">
        <label class="tg"><input type="checkbox" id="showGhost"> mostrar bola fantasma</label>
        <label class="tg"><input type="checkbox" id="showAngles"> mostrar ângulos</label>
        <label class="tg"><input type="checkbox" id="showGrid"> mostrar grade de frações</label>
        <label class="tg"><input type="checkbox" id="showCover"> mostrar recobrimento</label>
        <label class="tg"><input type="checkbox" id="realShot"> tacada real (arrastar ponto A)</label>
        <label class="tg"><input type="checkbox" id="show180"> regra do corte (α₁ + α₂)</label>
        <label class="tg"><input type="checkbox" id="showTri"> mostrar triângulos</label>
      </div>
      <div class="realbtns" id="realbtns" style="display:none">
        <button class="rbtn" id="btnHalf">meia bola 30°</button>
        <button class="rbtn" id="btnIdeal">mira ideal</button>
      </div>
    </div>
    <div class="panel calcpanel">
      <h2>Como A foi calculado</h2>
      <div class="calc" id="calc"></div>
    </div>
    </div>
  </div>

<script>
const SVG = document.getElementById('table');
const NS = 'http://www.w3.org/2000/svg';

// ---- geometria da mesa (coordenadas internas do feltro) ----
// feltro interno: x [L..R], y [T..B]
const L=70, R=530, T=70, B=690;          // bordas internas (tabelas)
const W = R-L, H = B-T;
const BALL = 17;                          // raio das bolas
const POCKET = 15;                        // raio das caçapas

// caçapas: 4 cantos + 2 meio (lados esquerdo/direito no comprimento)
const pockets = {
  SE: {x:L, y:T, label:'Sup-Esq'},
  SD: {x:R, y:T, label:'Sup-Dir'},
  ME: {x:L, y:(T+B)/2, label:'Meio-Esq'},
  MD: {x:R, y:(T+B)/2, label:'Meio-Dir'},
  IE: {x:L, y:B, label:'Inf-Esq'},
  ID: {x:R, y:B, label:'Inf-Dir'},
};
const pocketOrder = ['SE','SD','ME','MD','IE','ID'];

// estado: posicoes default equivalentes ao diagrama (objeto acima-esq, branca abaixo, alvo Sup-Dir)
const DEF = {
  obj:{x: L + 0.43*W, y: T + 0.46*H},
  cue:{x: L + 0.30*W, y: T + 0.86*H},
  target:'SD'
};
let state = JSON.parse(JSON.stringify(DEF));
let realA = null;   // ponto A arrastavel no modo "tacada real" (null = ainda nao definido)

// ---- construir SVG ----
function buildStatic(){
  let s = '';
  // moldura (madeira)
  s += `<rect x="30" y="30" width="540" height="700" rx="22" fill="var(--rail)"/>`;
  s += `<rect x="44" y="44" width="512" height="672" rx="14" fill="var(--rail-light)"/>`;
  // feltro
  s += `<rect x="${L}" y="${T}" width="${W}" height="${H}" rx="6" fill="var(--felt)"/>`;
  s += `<rect x="${L}" y="${T}" width="${W}" height="${H}" rx="6" fill="none" stroke="var(--felt-dark)" stroke-width="2"/>`;
  // labels das tabelas
  s += `<text class="tbl" x="${(L+R)/2}" y="${T-27}" text-anchor="middle">Tabela 1 (superior)</text>`;
  s += `<text class="tbl" x="${(L+R)/2}" y="${B+34}" text-anchor="middle">Tabela 3 (inferior)</text>`;
  s += `<text class="tbl" x="${L-30}" y="${(T+B)/2}" text-anchor="middle" transform="rotate(-90 ${L-30} ${(T+B)/2})">Tabela 4 (esquerda)</text>`;
  s += `<text class="tbl" x="${R+30}" y="${(T+B)/2}" text-anchor="middle" transform="rotate(90 ${R+30} ${(T+B)/2})">Tabela 2 (direita)</text>`;
  return s;
}

function axisLayer(){
  // origem no canto inferior esquerdo do feltro (L,B). x->direita, y->cima.
  const ox=L+14, oy=B-14;     // recuado um pouco para dentro do feltro
  const len=46;
  const col='#f0e9d8';
  let s='';
  // eixo x
  s+=`<line x1="${ox}" y1="${oy}" x2="${ox+len}" y2="${oy}" stroke="${col}" stroke-width="1.6" marker-end="url(#axis)"/>`;
  // eixo y (para cima)
  s+=`<line x1="${ox}" y1="${oy}" x2="${ox}" y2="${oy-len}" stroke="${col}" stroke-width="1.6" marker-end="url(#axis)"/>`;
  // rotulos
  s+=`<text class="axislbl" x="${ox+len+4}" y="${oy+4}">x</text>`;
  s+=`<text class="axislbl" x="${ox-3}" y="${oy-len-6}" text-anchor="middle">y</text>`;
  s+=`<text class="axislbl" x="${ox+6}" y="${oy+13}">0,0</text>`;
  s+=`<circle cx="${ox}" cy="${oy}" r="2.4" fill="${col}"/>`;
  return s;
}

function legendLayer(){
  // legenda estatica das retas, ao lado dos eixos x/y (canto inferior esquerdo)
  const x0=L+96, y0=B-56;     // dentro do feltro, acima do eixo x
  let s='';
  s+=`<line x1="${x0}" y1="${y0}" x2="${x0+22}" y2="${y0}" stroke="var(--line1)" stroke-width="2.6" stroke-dasharray="8 4"/>`;
  s+=`<text class="leg" x="${x0+28}" y="${y0+4}">linha 1 (alvo)</text>`;
  s+=`<line x1="${x0}" y1="${y0+16}" x2="${x0+22}" y2="${y0+16}" stroke="var(--line2)" stroke-width="2" stroke-dasharray="6 4"/>`;
  s+=`<text class="leg" x="${x0+28}" y="${y0+20}">linha 2 (tiro)</text>`;
  return s;
}

function gridLayer(){
  if(!document.getElementById('showGrid').checked) return '';
  let s='';
  // verticais a 1/4 1/2 3/4 da largura
  [[0.25,'#cfe0d8'],[0.5,'#bcd6cb'],[0.75,'#cfe0d8']].forEach(([f,c])=>{
    const x=L+f*W;
    s+=`<line x1="${x}" y1="${T}" x2="${x}" y2="${B}" stroke="${c}" stroke-width="1" stroke-dasharray="2 6"/>`;
  });
  s+=`<text class="frac" x="${L+0.5*W}" y="${B-6}" text-anchor="middle">1/2</text>`;
  s+=`<text class="frac" x="${L+0.25*W}" y="${B-6}" text-anchor="middle">1/4</text>`;
  s+=`<text class="frac" x="${L+0.75*W}" y="${B-6}" text-anchor="middle">3/4</text>`;
  return s;
}

function pocketsLayer(){
  let s='';
  for(const k of pocketOrder){
    const p=pockets[k];
    const on = (k===state.target);
    s+=`<circle cx="${p.x}" cy="${p.y}" r="${POCKET}" fill="#10130f"/>`;
    if(on){
      s+=`<circle cx="${p.x}" cy="${p.y}" r="${POCKET+4}" fill="none" stroke="var(--A)" stroke-width="2.5"/>`;
      s+=`<text class="ctag" x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff">C</text>`;
    }
  }
  return s;
}

function realMode(){ const e=document.getElementById('realShot'); return e && e.checked; }

// ---- nucleo: calcular fantasma, linha1, linha2, ponto A ----
function compute(){
  const C = pockets[state.target];
  const O = state.obj;
  const Q = state.cue;
  // direcao da cacapa->objeto (unit)
  let dx=O.x-C.x, dy=O.y-C.y;
  const n=Math.hypot(dx,dy)||1; dx/=n; dy/=n;
  // fantasma (centro da branca no instante do impacto): uma bola alem do centro
  // da objeto, na direcao oposta a cacapa. A reta de mira passa por este centro.
  const F = {x:O.x + dx*2*BALL, y:O.y + dy*2*BALL};
  // ponto de contato P (onde as bolas se tocam): meia bola, so para referencia
  const P = {x:O.x + dx*BALL, y:O.y + dy*BALL};

  // linha 2: reta da branca passando pelo CENTRO da fantasma, ate a tabela atingida
  const v = {x:F.x-Q.x, y:F.y-Q.y};
  const A = intersectRail(Q, v, state.target);

  // angulos contra a horizontal (graus, 0..90), medidos como inclinacao da reta
  const t1 = angleH(C, O);     // linha 1 IDEAL (objeto->caçapa) — usado no metodo "180 − α"
  const t2 = angleH(Q, F);     // linha 2: branca->fantasma
  // fracao horizontal de A
  let afrac = (A.x - L)/W;
  // angulo de corte = angulo entre a linha 1 (objeto->cacapa) e a linha 2 (branca->fantasma),
  // tomado como o angulo agudo (0..90). Mesmas retas que aparecem desenhadas.
  const angL = angleBetween({x:C.x-O.x,y:C.y-O.y}, {x:F.x-Q.x,y:F.y-Q.y});
  const cut = Math.min(angL, 180-angL);

  // ---- modo "tacada real": A e arrastado; recalcula a trajetoria REAL da objeto ----
  // A branca viaja na linha 2 (Q -> realA). Ela toca a objeto quando o centro da branca
  // fica a 2*BALL (um diametro) do centro da objeto: esse e o "impacto real" (Fr).
  // A objeto sai na direcao (centro objeto - ponto de impacto) = reta que une os centros.
  let real = null;
  if(realMode()){
    const Atgt = realA || A;                 // se ainda nao arrastado, parte do A ideal
    let ux=Atgt.x-Q.x, uy=Atgt.y-Q.y; const un=Math.hypot(ux,uy)||1; ux/=un; uy/=un;
    // resolver |Q + t*u - O| = 2*BALL  (primeiro contato, menor t>0)
    const ox=Q.x-O.x, oy=Q.y-O.y;
    const bq=ux*ox+uy*oy, cq=ox*ox+oy*oy-(2*BALL)*(2*BALL);
    const disc=bq*bq-cq;
    let Fr=null, dirObj=null, hitsObj=false, objEnd=null;
    if(disc>=0){
      const t=-bq-Math.sqrt(disc);           // menor raiz = primeiro contato
      if(t>0){
        hitsObj=true;
        Fr={x:Q.x+ux*t, y:Q.y+uy*t};         // centro da branca no impacto real
        // direcao de saida da objeto: do ponto de impacto para o centro da objeto
        let gx=O.x-Fr.x, gy=O.y-Fr.y; const gn=Math.hypot(gx,gy)||1; gx/=gn; gy/=gn;
        dirObj={x:gx,y:gy};
        objEnd=intersectRail(O,{x:gx,y:gy},state.target); // ate a tabela (trajetoria real)
      }
    }
    real={Atgt,Fr,dirObj,hitsObj,objEnd,u:{x:ux,y:uy}};
  }

  return {C,O,Q,P,F,A,t1,t2,afrac,cut,real};
}

// ---- acha o ponto A na tabela alvo que produz um dado ANGULO DE CORTE real ----
// Varre o rail da caçapa alvo, simula a tacada real para cada A candidato e devolve
// o A cujo corte real ~= cutTgt E cuja saida da objeto aponta mais para a caçapa
// (mesmo criterio do botao "meia bola"). Salva/restaura o realA atual. null se nao achar.
function findAforCut(cutTgt, tol){
  // Varre as direcoes de tiro a partir da branca (leque de ±90° em torno de B->objeto,
  // que cobre toda direcao capaz de tocar a objeto). Para cada direcao simula a tacada
  // real; entre as que dao o corte alvo e mandam a objeto rumo a caçapa, escolhe a melhor.
  // Devolve o A = PRIMEIRA tabela atingida nessa direcao (qualquer uma das 4), ou null.
  // Vale para qualquer caçapa, inclusive as do meio (a mira pode cair noutra tabela).
  const g0=compute();
  const C=g0.C, O=g0.O, Q=g0.Q;
  let cdx=C.x-O.x, cdy=C.y-O.y; const cn=Math.hypot(cdx,cdy)||1; cdx/=cn; cdy/=cn;
  const base=Math.atan2(O.y-Q.y, O.x-Q.x);
  const saved=realA;
  let best=null, bestScore=-1e9;
  const M=540;
  for(let i=0;i<=M;i++){
    const ang=base + (-1 + 2*i/M)*(Math.PI/2);     // base ± 90°
    const dir={x:Math.cos(ang), y:Math.sin(ang)};
    realA={x:Q.x+dir.x*1000, y:Q.y+dir.y*1000, rail:'?'};   // ponto distante p/ fixar a direcao
    const g=compute();
    if(g.real && g.real.hitsObj){
      const a=angleBetween({x:g.real.dirObj.x,y:g.real.dirObj.y},{x:-g.real.u.x,y:-g.real.u.y});
      const cutR=Math.min(a,180-a);
      const align=g.real.dirObj.x*cdx + g.real.dirObj.y*cdy;   // >0 => objeto ruma a caçapa
      if(align>0 && Math.abs(cutR-cutTgt)<tol){
        const score=align - Math.abs(cutR-cutTgt)*0.05;
        if(score>bestScore){
          bestScore=score;
          const hit=intersectRail(Q, g.real.u, state.target);   // 1a tabela na direcao de tiro
          best={x:hit.x, y:hit.y, rail:hit.rail};
        }
      }
    }
  }
  realA=saved;
  return best;
}

// intersecta a reta (origin + t*dir, t>0) com a primeira tabela que encontrar para frente
function intersectRail(origin, dir, target){
  const cands=[];
  // tabela superior y=T, inferior y=B
  if(Math.abs(dir.y)>1e-6){
    let t=(T-origin.y)/dir.y; if(t>1e-6){const x=origin.x+dir.x*t; if(x>=L-0.5&&x<=R+0.5) cands.push({t,x,y:T,rail:'T'});}
    t=(B-origin.y)/dir.y; if(t>1e-6){const x=origin.x+dir.x*t; if(x>=L-0.5&&x<=R+0.5) cands.push({t,x,y:B,rail:'B'});}
  }
  // lados x=L, x=R
  if(Math.abs(dir.x)>1e-6){
    let t=(L-origin.x)/dir.x; if(t>1e-6){const y=origin.y+dir.y*t; if(y>=T-0.5&&y<=B+0.5) cands.push({t,x:L,y,rail:'L'});}
    t=(R-origin.x)/dir.x; if(t>1e-6){const y=origin.y+dir.y*t; if(y>=T-0.5&&y<=B+0.5) cands.push({t,x:R,y,rail:'R'});}
  }
  if(!cands.length) return {x:origin.x,y:origin.y,rail:'?'};
  // menor t positivo = primeira tabela atingida
  cands.sort((a,b)=>a.t-b.t);
  const hit=cands[0];
  // a tabela onde esta a cacapa alvo
  const targetRail = (target==='SE'||target==='SD')?'T':(target==='IE'||target==='ID')?'B':(target==='ME')?'L':'R';
  hit.onTargetRail = (hit.rail===targetRail);
  return hit;
}

function angleH(a,b){ // MENOR angulo da reta a->b com a horizontal, 0..90
  let ang=Math.atan2(-(b.y-a.y), (b.x-a.x))*180/Math.PI;
  if(ang<0) ang+=180;
  if(ang>90) ang=180-ang;     // sempre o agudo (a reta nao tem sentido p/ este angulo)
  return ang;
}
function angleBetween(u,w){
  const d=(u.x*w.x+u.y*w.y)/((Math.hypot(u.x,u.y)||1)*(Math.hypot(w.x,w.y)||1));
  return Math.acos(Math.max(-1,Math.min(1,d)))*180/Math.PI;
}

// ---- camada dinamica (linhas, bolas, A, angulos) ----
function dynamicLayer(){
  const g = compute();
  const showGhost = document.getElementById('showGhost').checked;
  const showAng = document.getElementById('showAngles').checked;
  const showTri = document.getElementById('showTri').checked;
  const showCover = document.getElementById('showCover').checked;
  const show180 = document.getElementById('show180').checked;
  let s='';

  // triangulos semelhantes (por baixo de tudo): pequeno B->F, grande B->A
  // angulo reto no vertice B; cateto vertical sobe de B ate a altura do alvo
  if(showTri){
    const Bx=g.Q.x, By=g.Q.y, Fx=g.F.x, Fy=g.F.y, Ax=g.A.x, Ay=g.A.y;
    // grande: B, canto(Bx,Ay), A
    s += `<polygon points="${Bx},${By} ${Bx},${Ay} ${Ax},${Ay}" fill="#ffd24a" fill-opacity="0.18" stroke="#ffd24a" stroke-width="1.5"/>`;
    // pequeno: B, canto(Bx,Fy), F
    s += `<polygon points="${Bx},${By} ${Bx},${Fy} ${Fx},${Fy}" fill="#ffffff" fill-opacity="0.28" stroke="#ffffff" stroke-width="1.5"/>`;
    // rotulos dos catetos
    s += `<text class="trilbl" fill="#ffffff" x="${Bx-8}" y="${(By+Fy)/2}" text-anchor="end">Fy − By</text>`;
    s += `<text class="trilbl" fill="#ffffff" x="${(Bx+Fx)/2}" y="${Fy-6}" text-anchor="middle">Fx − Bx</text>`;
    s += `<text class="trilbl" fill="#ffd24a" x="${Bx-8}" y="${(By+Ay)/2-40}" text-anchor="end">1 − By</text>`;
    s += `<text class="trilbl" fill="#ffd24a" x="${(Bx+Ax)/2}" y="${Ay-6}" text-anchor="middle">A − Bx</text>`;
  }

  const isReal = realMode() && g.real;
  let gammaPivot = null;   // intersecao das retas 1 e 2 (preenchido no bloco do arco γ)

  /* ============================================================================
     ARCO γ  --  ANGULO DE CORTE   (LER ANTES DE MEXER -- ja errei aqui)
     ----------------------------------------------------------------------------
     >>> LINHA 1 = TRAJETORIA REAL DA BOLA ALVO. <<<  NAO e "O->caçapa".
         So coincide com O->caçapa no modo ideal (a mira encaçapa). No modo
         "tacada real" a alvo sai numa direcao que pode ERRAR a caçapa -- ESSA
         direcao e a linha 1. NUNCA tratar linha 1 como O->caçapa fixo.

     γ = MENOR angulo entre a reta 1 (trajetoria da alvo) e a reta 2 (linha de
         tiro). Depende SO das coordenadas dessas duas retas -- nao de checkbox.

     VERTICE do arco = INTERSECAO das retas 1 e 2 (cada uma prolongada ate se
         cruzarem). NAO usar O nem a fantasma como vertice: as duas retas so se
         encontram no ponto de intersecao, e e la que o angulo visivel existe.

     Definicao das retas por DOIS PONTOS cada (vigentes em cada modo):
       reta 2 (tiro)      : Q  ->  A2            (A2 = ponto A ideal ou arrastado)
       reta 1 (trajetoria): O  ->  fimTraj
            modo real c/ acerto: fimTraj = g.real.objEnd  (saida real, pode errar)
            caso contrario     : fimTraj = C              (saida ideal O->caçapa)
     ============================================================================ */
  {
    const GAMMA = '#ff8c42';
    const A2g = isReal ? g.real.Atgt : g.A;
    // dois pontos de cada reta
    const L2a = g.Q, L2b = A2g;                                  // linha de tiro
    const L1a = g.O;
    const L1b = (isReal && g.real.hitsObj && g.real.objEnd) ? g.real.objEnd : g.C; // trajetoria da alvo
    // direcoes
    let d2x=L2b.x-L2a.x, d2y=L2b.y-L2a.y; let n2=Math.hypot(d2x,d2y)||1; d2x/=n2; d2y/=n2;
    let d1x=L1b.x-L1a.x, d1y=L1b.y-L1a.y; let n1=Math.hypot(d1x,d1y)||1; d1x/=n1; d1y/=n1;
    // intersecao das duas retas: L1a + t*d1 = L2a + s*d2
    const den = d1x*(-d2y) - d1y*(-d2x);
    let pivot;
    if(Math.abs(den) > 1e-6){
      const rx=L2a.x-L1a.x, ry=L2a.y-L1a.y;
      const t=(rx*(-d2y) - ry*(-d2x))/den;
      pivot={x:L1a.x+d1x*t, y:L1a.y+d1y*t};
    } else {
      pivot={x:g.O.x, y:g.O.y};   // retas paralelas (degenerado): cai na objeto
    }
    // menor angulo entre as retas
    const dd = d1x*d2x + d1y*d2y;
    let gammaDeg = Math.acos(Math.max(-1,Math.min(1,dd)))*180/Math.PI;
    const gamma = Math.min(gammaDeg, 180-gammaDeg);
    // sentidos a desenhar a partir do pivot: escolher os que formam o ANGULO AGUDO
    // (apontando para os respectivos "fins" de cada reta)
    let s1={x:d1x,y:d1y}, s2={x:d2x,y:d2y};
    // alinhar s1 para o lado do fim da trajetoria (L1b) e s2 para o lado do A (L2b)
    if((L1b.x-pivot.x)*s1.x + (L1b.y-pivot.y)*s1.y < 0){ s1={x:-s1.x,y:-s1.y}; }
    if((L2b.x-pivot.x)*s2.x + (L2b.y-pivot.y)*s2.y < 0){ s2={x:-s2.x,y:-s2.y}; }
    // se esse par der o angulo obtuso, inverte um deles para mostrar o agudo
    if(s1.x*s2.x + s1.y*s2.y < 0){ s2={x:-s2.x,y:-s2.y}; }
    const R=72;
    gammaPivot = pivot;   // expõe para o desenho da linha 1 estendida
    const towardA={x:pivot.x+s1.x*R, y:pivot.y+s1.y*R};
    const towardB={x:pivot.x+s2.x*R, y:pivot.y+s2.y*R};
    s += arc2(pivot, towardA, towardB, R, GAMMA, 'γ = '+gamma.toFixed(0)+'°');
  }

  // linha 2 (linha de tiro): da branca ate o A. no modo real termina na BORDA da bolinha
  // de arraste (recuo de 9px) para a seta nao ficar coberta por ela. label sai na legenda.
  const A2 = isReal ? g.real.Atgt : g.A;
  s += dashLineToPoint(g.Q, A2, BALL, 'var(--line2)', true, isReal ? 9 : 0);

  if(isReal){
    // linha 1 IDEAL como referencia: pontilhada clara, objeto -> cacapa
    s += `<line x1="${g.O.x}" y1="${g.O.y}" x2="${g.C.x}" y2="${g.C.y}" stroke="#ffe9a8" stroke-width="1.4" stroke-dasharray="2 5" opacity="0.7"/>`;
    // linha 1 REAL: trajetoria de fato da objeto (amarelo forte), so se a branca acerta a objeto.
    // estende da INTERSECAO com a linha de tiro (gammaPivot), passando pela objeto, ate a parede.
    // A SETA fica no FIM da reta (na parede, objEnd), apontando no sentido de saida da alvo.
    if(g.real.hitsObj && g.real.objEnd){
      // segmento da intersecao ate a borda da objeto (sem seta)
      if(gammaPivot){
        let vx=g.O.x-gammaPivot.x, vy=g.O.y-gammaPivot.y; const vn=Math.hypot(vx,vy)||1; vx/=vn; vy/=vn;
        const endx=g.O.x-vx*BALL, endy=g.O.y-vy*BALL;   // para na borda da bola
        s += `<line x1="${gammaPivot.x.toFixed(1)}" y1="${gammaPivot.y.toFixed(1)}" x2="${endx.toFixed(1)}" y2="${endy.toFixed(1)}" stroke="var(--line1)" stroke-width="2.6" stroke-dasharray="10 6"/>`;
      }
      // segmento da objeto ate a parede (saida real), com SETA no FIM
      let ox=g.real.objEnd.x-g.O.x, oy=g.real.objEnd.y-g.O.y; const onn=Math.hypot(ox,oy)||1; ox/=onn; oy/=onn;
      const sx=g.O.x+ox*BALL, sy=g.O.y+oy*BALL;
      s += `<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${g.real.objEnd.x.toFixed(1)}" y2="${g.real.objEnd.y.toFixed(1)}" stroke="var(--line1)" stroke-width="2.6" stroke-dasharray="10 6" marker-end="url(#arr1)"/>`;
    }
  } else {
    // linha 1: cacapa -> objeto (verde/amarela tracejada). label sai na legenda.
    s += dashLine(g.C, g.O, POCKET, BALL, 'var(--line1)');
  }

  // metodo "180 - alfa": angulo VISIVEL entre (obj->branca) e (obj->cacapa), medido na objeto.
  // corte ≈ 180 - alfa. Tudo usa pontos reais (branca, objeto, cacapa).
  if(show180){
    const M180 = '#c98bdc';   // roxo claro, cor propria
    // α₁: angulo AGUDO da linha 1 IDEAL (objeto->caçapa) com a horizontal
    const hx1 = (g.C.x >= g.O.x) ? 70 : -70;
    s += `<line x1="${g.O.x}" y1="${g.O.y}" x2="${g.O.x+hx1}" y2="${g.O.y}" stroke="${M180}" stroke-width="1" stroke-dasharray="3 3"/>`;
    s += arc(g.O, g.C, 44, M180, 'α₁ = '+g.t1.toFixed(0)+'°');
    // linha objeto->branca (a outra ja existe como linha 1 obj->cacapa)
    s += `<line x1="${g.O.x}" y1="${g.O.y}" x2="${g.Q.x}" y2="${g.Q.y}" stroke="${M180}" stroke-width="1.6" stroke-dasharray="2 4"/>`;
    // α (interno, nao exibido): so para escolher o sinal certo da combinacao α₁/α₂
    const alpha = angleBetween({x:g.Q.x-g.O.x,y:g.Q.y-g.O.y},{x:g.C.x-g.O.x,y:g.C.y-g.O.y});
    // α₂: angulo na OBJETO entre a reta objeto->branca e a vertical
    const dxQ=g.Q.x-g.O.x, dyQ=g.Q.y-g.O.y;
    // vertical de referencia: para baixo ou para cima, o que estiver do mesmo lado da branca
    const vy = (dyQ>=0) ? 1 : -1;
    // a linha vertical vai de O ate a ALTURA da branca (By), mantendo x = Ox (vertical)
    const vert = {x:g.O.x, y:g.Q.y};
    const alpha2 = angleBetween({x:dxQ,y:dyQ},{x:0,y:vy});
    s += `<line x1="${g.O.x}" y1="${g.O.y}" x2="${g.O.x}" y2="${g.Q.y.toFixed(1)}" stroke="${M180}" stroke-width="1" stroke-dasharray="3 3"/>`;
    s += arc2(g.O, g.Q, vert, 62, M180, 'α₂ = '+alpha2.toFixed(0)+'°');
    // combinacao de α₁ e α₂ (com o sinal que reproduz a geometria; α nao e exibido).
    // identidade exata: α = 90° + comb  ⟹  corte ≈ 90° − comb. meia bola = comb 60° (corte 30°).
    const a1=g.t1, a2=alpha2;
    const cand=[{v:a1+a2,t:'α₁+α₂'},{v:a2-a1,t:'α₂−α₁'},{v:a1-a2,t:'α₁−α₂'},{v:-a1-a2,t:'−α₁−α₂'}];
    let pick=cand[0];
    for(const c of cand){ if(Math.abs((90+c.v)-alpha) < Math.abs((90+pick.v)-alpha)) pick=c; }
    const comb = pick.v;
    const d = comb - 60;                  // comparado com a meia bola (60°)
    let regra;
    if(Math.abs(d) < 0.5)      regra = '= 1/2 bola (corte 30°)';
    else if(d < 0)             regra = (-d < 8 ? 'pouco mais' : 'mais') + ' corte que 1/2 bola';
    else                       regra = (d < 8 ? 'pouco menos' : 'menos') + ' corte que 1/2 bola';
    // ---- painel no canto: lado VERTICAL oposto ao da caçapa, lado HORIZONTAL oposto ao da branca ----
    // ex.: caçapa em cima -> painel embaixo; branca a esquerda -> painel a direita.
    const BW=232, BH=90, m=16;
    const midX=(L+R)/2, midY=(T+B)/2;
    const right = g.Q.x < midX;        // branca a esquerda -> painel a direita
    const bottom = g.C.y < midY;       // caçapa em cima   -> painel embaixo
    const bx = right ? (R-m-BW) : (L+m);
    const by = bottom ? (B-m-BH) : (T+m);
    const tx=bx+12, ty=by+22;
    s += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${BW}" height="${BH}" rx="8" fill="#0a513f" fill-opacity="0.85" stroke="${M180}" stroke-width="1.2"/>`;
    s += `<text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" fill="${M180}" font-size="13" font-weight="700">${pick.t} = ${comb.toFixed(0)}°</text>`;
    s += `<text x="${tx.toFixed(1)}" y="${(ty+20).toFixed(1)}" fill="${M180}" font-size="11">α₁+α₂ &lt; 60° → mais corte</text>`;
    s += `<text x="${tx.toFixed(1)}" y="${(ty+34).toFixed(1)}" fill="${M180}" font-size="11">α₁+α₂ &gt; 60° → menos corte</text>`;
    s += `<text x="${tx.toFixed(1)}" y="${(ty+56).toFixed(1)}" fill="${M180}" font-size="12" font-weight="700">→ ${regra}</text>`;
  }

  // angulos: θ₂ (linha 2 × horizontal). α₁ saiu daqui e foi para o metodo "180 − α".
  if(showAng){
    // horizontal de referencia para o lado mais proximo da linha 2 (angulo AGUDO < 90°)
    const hx2 = (g.F.x >= g.Q.x) ? 70 : -70;
    s += `<line x1="${g.Q.x}" y1="${g.Q.y}" x2="${g.Q.x+hx2}" y2="${g.Q.y}" stroke="#7c7c76" stroke-width="1" stroke-dasharray="3 3"/>`;
    s += arc(g.Q, g.F, 50, 'var(--line2)', 'θ₂ = '+g.t2.toFixed(0)+'°');
  }

  // bola fantasma
  if(showGhost){
    s += `<circle cx="${g.F.x}" cy="${g.F.y}" r="${BALL}" fill="none" stroke="var(--ghost)" stroke-width="1.6" stroke-dasharray="4 3"/>`;
    s += `<circle cx="${g.F.x}" cy="${g.F.y}" r="2.4" fill="var(--ghost)"/>`;
    s += `<text class="lbl" fill="var(--ghost)" x="${g.F.x}" y="${g.F.y+BALL+14}" text-anchor="middle">fantasma "F"</text>`;
  }

  // modo real: marcas de recobrimento na tabela do ponto A.
  // onde mirar A para cada cobertura padrao (1/4, 1/2, 3/4 de bola).
  // cobertura = 1 - sin(corte)  =>  corte alvo = asin(1 - cobertura).
  if(isReal){
    const MKCOL = '#37c0d8';
    const marks = [{cov:0.25,lbl:'1/4'},{cov:0.50,lbl:'1/2'},{cov:0.75,lbl:'3/4'}];
    for(const m of marks){
      const cutTgt = Math.asin(Math.max(0,Math.min(1,1-m.cov)))*180/Math.PI;
      const P = findAforCut(cutTgt, 2.5);
      if(!P) continue;
      if(P.rail==='T'||P.rail==='B'){
        const y0 = P.rail==='T'?T:B;
        const ly = P.rail==='T'? T+15 : B-9;     // rotulo no lado do feltro
        s += `<line x1="${P.x.toFixed(1)}" y1="${(y0-7).toFixed(1)}" x2="${P.x.toFixed(1)}" y2="${(y0+7).toFixed(1)}" stroke="${MKCOL}" stroke-width="2"/>`;
        s += `<circle cx="${P.x.toFixed(1)}" cy="${y0}" r="2.6" fill="${MKCOL}"/>`;
        s += `<text x="${P.x.toFixed(1)}" y="${ly}" text-anchor="middle" fill="${MKCOL}" font-size="10" font-weight="700">${m.lbl}</text>`;
      } else {
        const x0 = P.rail==='L'?L:R;
        const lx = P.rail==='L'? L+13 : R-13;
        const anchor = P.rail==='L'?'start':'end';
        s += `<line x1="${(x0-7).toFixed(1)}" y1="${P.y.toFixed(1)}" x2="${(x0+7).toFixed(1)}" y2="${P.y.toFixed(1)}" stroke="${MKCOL}" stroke-width="2"/>`;
        s += `<circle cx="${x0}" cy="${P.y.toFixed(1)}" r="2.6" fill="${MKCOL}"/>`;
        s += `<text x="${lx}" y="${(P.y+3).toFixed(1)}" text-anchor="${anchor}" fill="${MKCOL}" font-size="10" font-weight="700">${m.lbl}</text>`;
      }
    }
  }

  // ponto A: no modo real e arrastavel (e o alvo da mira), maior e com classe ball
  const Apt = isReal ? g.real.Atgt : g.A;
  if(isReal){
    // ponto de impacto real (onde a branca toca a objeto) - bolinha de referencia
    if(g.real.hitsObj && g.real.Fr){
      s += `<circle cx="${g.real.Fr.x.toFixed(1)}" cy="${g.real.Fr.y.toFixed(1)}" r="${BALL}" fill="none" stroke="var(--line2)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.6"/>`;
    }
    s += `<circle class="ball" data-b="A" cx="${Apt.x.toFixed(1)}" cy="${Apt.y.toFixed(1)}" r="8" fill="var(--A)" stroke="#0f6e56" stroke-width="2"/>`;
  } else {
    s += `<circle cx="${g.A.x}" cy="${g.A.y}" r="6" fill="var(--A)"/>`;
  }
  // fracao ao longo da tabela atingida (mesma usada no painel)
  let Afrac;
  const Arail = isReal ? g.real.Atgt.rail : g.A.rail;
  if(Arail==='T'||Arail==='B') Afrac=(Apt.x-L)/W; else Afrac=(Apt.y-T)/H;
  const Apct = Math.round(Afrac*100)+'%';
  // posicao do label: na tabela superior, na faixa de madeira acima do ponto
  // (abaixo do texto "Tabela 1" em y=T-22, acima da bolinha em y=T)
  let alx=Apt.x, aly;
  if(Arail==='T') aly=T-9;
  else if(Arail==='B') aly=B+16;
  else { alx=Apt.x+(Arail==='R'?-26:26); aly=Apt.y+5; }
  s += `<text class="Atag" x="${alx}" y="${aly}" text-anchor="middle" fill="var(--A)">A ${Apct}</text>`;

  // bolas arrastaveis (objeto e branca)
  s += `<circle class="ball" data-b="obj" cx="${g.O.x}" cy="${g.O.y}" r="${BALL}" fill="var(--obj)" stroke="var(--objb)" stroke-width="1.5"/>`;
  s += `<text class="bl" x="${g.O.x}" y="${g.O.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff">obj</text>`;
  // OPCAO 1 (versao B): bola de recobrimento encostada na objeto, no lado de onde a
  // branca ataca (direcao objeto->fantasma, oposta a caçapa). overlap = 1 - sin(corte).
  if(showCover){
    // no modo real, o recobrimento reflete a tacada de fato: corte entre a linha 2 real
    // (branca -> A arrastado) e a saida real da objeto; e a reta usada e a linha 2 real.
    let covCut, lineFrom, lineDir;
    if(isReal && g.real.hitsObj){
      const a1=angleBetween({x:g.real.dirObj.x,y:g.real.dirObj.y}, {x:-g.real.u.x,y:-g.real.u.y});
      covCut=Math.min(a1,180-a1);
      lineFrom=g.Q; lineDir={x:g.real.u.x,y:g.real.u.y};
    } else if(isReal && !g.real.hitsObj){
      // branca nem toca a objeto: sem recobrimento
      covCut=null;
    } else {
      covCut=g.cut; lineFrom=g.Q; lineDir={x:g.F.x-g.Q.x,y:g.F.y-g.Q.y};
    }
   if(covCut!==null){
    const cov = Math.max(0, Math.min(1, 1 - Math.sin(covCut*Math.PI/180)));
    const COVCOL = '#37c0d8';
    /* ============================================================================
       PRINCIPIO GEOMETRICO DA BOLA DE RECOBRIMENTO (ciano)  --  NAO ESQUECER
       ----------------------------------------------------------------------------
       A bola de recobrimento representa a SOBREPOSICAO MAXIMA entre a branca e a
       bola objeto durante a tacada.

       A branca viaja ao longo da LINHA DE TIRO (linha 2). Conforme ela avanca, a
       distancia entre o seu centro e o centro O da objeto varia. A sobreposicao
       entre as duas bolas e MAXIMA quando essa distancia centro-a-centro e MINIMA.

       O ponto da linha de tiro mais proximo de O e, por definicao, o PE DA
       PERPENDICULAR baixada de O sobre a linha de tiro. Logo:

         R (centro da bola de recobrimento) = pe da perpendicular de O sobre a linha 2.

       CONSEQUENCIA GEOMETRICA EXATA: o segmento OR e SEMPRE PERPENDICULAR a linha
       de tiro. Isso nao e aproximacao nem coincidencia visual -- e a propria
       definicao de pe da perpendicular. Se algum dia OR aparecer obliquo a linha
       de tiro, R foi calculado errado.

       ERRO ANTIGO (corrigido): versoes anteriores colocavam R deslocado ao longo
       da linha 2 (a uma distancia 2*BALL*(1-cov) de O), o que tornava OR obliquo e
       NAO representava a sobreposicao maxima. O ponto correto e o pe da
       perpendicular, e so ele.
       ============================================================================ */
    let ux=lineDir.x, uy=lineDir.y; const un=Math.hypot(ux,uy)||1; ux/=un; uy/=un; // dir da linha de tiro
    // pe da perpendicular = projecao de O sobre a linha de tiro
    const wx=g.O.x-lineFrom.x, wy=g.O.y-lineFrom.y;
    const proj=wx*ux+wy*uy;
    const footx=lineFrom.x+ux*proj, footy=lineFrom.y+uy*proj;
    const Rx=footx, Ry=footy;   // R = pe da perpendicular (OR perpendicular a linha de tiro)
    s += `<clipPath id="oclip"><circle cx="${g.O.x}" cy="${g.O.y}" r="${BALL}"/></clipPath>`;
    s += `<g clip-path="url(#oclip)"><circle cx="${Rx.toFixed(1)}" cy="${Ry.toFixed(1)}" r="${BALL}" fill="${COVCOL}" fill-opacity="0.45"/></g>`;
    s += `<circle cx="${Rx.toFixed(1)}" cy="${Ry.toFixed(1)}" r="${BALL}" fill="none" stroke="${COVCOL}" stroke-width="1.6" stroke-dasharray="4 3"/>`;
    // diametro tracejado (ao longo da linha 2) + ponto central
    const d1x=Rx-ux*BALL, d1y=Ry-uy*BALL, d2x=Rx+ux*BALL, d2y=Ry+uy*BALL;
    s += `<line x1="${d1x.toFixed(1)}" y1="${d1y.toFixed(1)}" x2="${d2x.toFixed(1)}" y2="${d2y.toFixed(1)}" stroke="${COVCOL}" stroke-width="1" stroke-dasharray="3 3"/>`;
    s += `<circle cx="${Rx.toFixed(1)}" cy="${Ry.toFixed(1)}" r="2.4" fill="${COVCOL}"/>`;
    // linha na direcao O->R, centrada em R: estende 2 DIAMETROS (4*BALL) para cada lado de R.
    let orx=Rx-g.O.x, ory=Ry-g.O.y; const orn=Math.hypot(orx,ory)||1; orx/=orn; ory/=orn;
    const ext = 4*BALL;                       // 2 diametros = 4 raios, para cada lado
    const P1x = Rx - orx*ext, P1y = Ry - ory*ext;
    const P2x = Rx + orx*ext, P2y = Ry + ory*ext;
    s += `<line x1="${P1x.toFixed(1)}" y1="${P1y.toFixed(1)}" x2="${P2x.toFixed(1)}" y2="${P2y.toFixed(1)}" stroke="${COVCOL}" stroke-width="1.4" stroke-dasharray="4 3"/>`;
    // direcao objeto->fantasma (usada adiante para posicionar o texto)
    let dx=g.F.x-g.O.x, dy=g.F.y-g.O.y; const dn=Math.hypot(dx,dy)||1; dx/=dn; dy/=dn;

    // ---- posicao do texto do recobrimento: quadrante LIVRE, calculado dinamicamente ----
    // Raciocinio: ao redor da bola objeto, dois quadrantes estao tipicamente ocupados e
    // ficam aproximadamente SOBRE A MESMA RETA (a reta de tacada / linha caçapa-objeto):
    //   - lado da caçapa  -> ocupado pela linha 1 (objeto -> C)
    //   - lado oposto     -> ocupado pela fantasma, pela bola de recobrimento e pela linha 2
    // Logo, os quadrantes livres sao os PERPENDICULARES a essa reta. Colocamos o texto
    // na perpendicular ao vetor objeto->fantasma (dx,dy). Existem dois lados perpendiculares
    // possiveis: (-dy,dx) e (dy,-dx). Escolhemos o que aponta MAIS PARA DENTRO da mesa
    // (longe das bordas), testando qual leva o texto para mais perto do centro do feltro.
    // Como branca, objeto, caçapa e a geometria toda entram em dx/dy, esse calculo se
    // re-resolve sozinho sempre que o usuario arrasta uma bola ou troca a caçapa.
    const perp1 = {x:-dy, y:dx}, perp2 = {x:dy, y:-dx};
    const cxM=(L+R)/2, cyM=(T+B)/2;            // centro do feltro
    const probe = 60;                           // distancia de teste para avaliar o lado
    const d1 = Math.hypot(g.O.x+perp1.x*probe-cxM, g.O.y+perp1.y*probe-cyM);
    const d2 = Math.hypot(g.O.x+perp2.x*probe-cxM, g.O.y+perp2.y*probe-cyM);
    const perp = (d1<=d2) ? perp1 : perp2;      // lado que cai mais para dentro
    const off = BALL+18;
    const tx = g.O.x + perp.x*off;
    const ty = g.O.y + perp.y*off;
    // ancoragem horizontal conforme o texto fica a esquerda/direita da objeto
    const anchor = perp.x>0.2 ? 'start' : perp.x<-0.2 ? 'end' : 'middle';
    s += `<text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="${anchor}" fill="${COVCOL}" font-size="13" font-weight="700">${coverShort(cov)} · ${cov.toFixed(2)} · corte ${covCut.toFixed(0)}°</text>`;
   }
  }
  s += `<circle class="ball" data-b="cue" cx="${g.Q.x}" cy="${g.Q.y}" r="${BALL}" fill="#f7f5ef" stroke="#9a988f" stroke-width="1.5"/>`;
  s += `<text class="bl" x="${g.Q.x}" y="${g.Q.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#555">B</text>`;

  // atualizar painel
  const railName = {T:'Tabela 1',B:'Tabela 3',L:'Tabela 4',R:'Tabela 2'}[g.A.rail]||'–';
  document.getElementById('t2').textContent = g.t2.toFixed(1)+'°';
  // fracao ao longo da tabela atingida
  let frac;
  if(g.A.rail==='T'||g.A.rail==='B') frac=(g.A.x-L)/W; else frac=(g.A.y-T)/H;
  document.getElementById('afrac').innerHTML = frac.toFixed(2);
  document.getElementById('cut').textContent = g.cut.toFixed(1)+'°';

  // ---- memoria de calculo de A (em fracao de mesa) ----
  buildCalc(g, frac, railName);
  return s;
}

function coverName(f){
  // f = fracao coberta (0..1)
  if(f>=0.92) return 'cheia';
  if(f>=0.625) return '¾ bola';
  if(f>=0.375) return '½ bola (meia)';
  if(f>=0.125) return '¼ bola';
  return 'fina';
}
function coverShort(f){
  if(f>=0.92) return 'cheia';
  if(f>=0.625) return '3/4 bola';
  if(f>=0.375) return '1/2 bola';
  if(f>=0.125) return '1/4 bola';
  return 'fina';
}

function buildCalc(g, frac, railName){
  // origem no canto INFERIOR esquerdo: x cresce p/ direita, y cresce p/ cima
  // y=0 na Tabela 3 (inferior, pixel B), y=1 na Tabela 1 (superior, pixel T)
  const fx = v => (v-L)/W, fy = v => (B-v)/H;
  const Qx=fx(g.Q.x), Qy=fy(g.Q.y);
  const Fx=fx(g.F.x), Fy=fy(g.F.y);
  const horiz = (g.A.rail==='T'||g.A.rail==='B');
  // alvo da tabela em fracao: y=0 (T), y=1 (B), x=0 (L), x=1 (R)
  let railEq, t, Aaxis;
  const p2 = n => n.toFixed(2);
  let html='';
  html += `<div class="step">A reta de tacada vai da <b>branca</b> ao <b>centro da fantasma</b>, em fração de mesa:`
        + `<span class="formula">B = (${p2(Qx)} ; ${p2(Qy)})</span>`
        + `<span class="formula">F = (${p2(Fx)} ; ${p2(Fy)})</span></div>`;
  if(horiz){
    const railY = (g.A.rail==='T')?1:0;
    t = (railY - Qy)/(Fy - Qy);
    Aaxis = Qx + (Fx - Qx)*t;
    html += `<div class="step">Avançamos da branca em direção à fantasma até a <b>${railName}</b> (y = ${railY}). `
          + `Quantas vezes esticar:`
          + `<span class="formula gen">t = (${railY} − By) ÷ (Fy − By)</span>`
          + `<span class="formula">t = (${railY} − ${p2(Qy)}) ÷ (${p2(Fy)} − ${p2(Qy)}) = ${t.toFixed(2)}</span></div>`;
    html += `<div class="step">Posição horizontal de A:`
          + `<span class="formula gen">A = Bx + (Fx − Bx) × t</span>`
          + `<span class="formula">A = ${p2(Qx)} + (${p2(Fx)} − ${p2(Qx)}) × ${t.toFixed(2)} = ${Aaxis.toFixed(2)}</span></div>`;
  } else {
    const railX = (g.A.rail==='L')?0:1;
    t = (railX - Qx)/(Fx - Qx);
    Aaxis = Qy + (Fy - Qy)*t;
    html += `<div class="step">Avançamos da branca em direção à fantasma até a <b>${railName}</b> (x = ${railX}). `
          + `Quantas vezes esticar:`
          + `<span class="formula gen">t = (${railX} − Bx) ÷ (Fx − Bx)</span>`
          + `<span class="formula">t = (${railX} − ${p2(Qx)}) ÷ (${p2(Fx)} − ${p2(Qx)}) = ${t.toFixed(2)}</span></div>`;
    html += `<div class="step">Posição de A ao longo da tabela:`
          + `<span class="formula gen">A = By + (Fy − By) × t</span>`
          + `<span class="formula">A = ${p2(Qy)} + (${p2(Fy)} − ${p2(Qy)}) × ${t.toFixed(2)} = ${Aaxis.toFixed(2)}</span></div>`;
  }
  html += `<div class="step"><b>A = ${Math.round(frac*100)}%</b> da ${railName}.</div>`;
  document.getElementById('calc').innerHTML = html;
}

function dashLine(a,b,ra,rb,color){
  // de borda de a (raio ra) ate borda de b (raio rb)
  let dx=b.x-a.x, dy=b.y-a.y; const n=Math.hypot(dx,dy)||1; dx/=n; dy/=n;
  const x1=a.x+dx*ra, y1=a.y+dy*ra, x2=b.x-dx*rb, y2=b.y-dy*rb;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2.6" stroke-dasharray="10 6"/>`;
}
function dashLineToPoint(a,P,ra,color,arrow,rb){
  // ra = recuo no inicio (borda da branca); rb = recuo no fim (p/ a seta nao bater no alvo)
  let dx=P.x-a.x, dy=P.y-a.y; const n=Math.hypot(dx,dy)||1; dx/=n; dy/=n;
  const back=rb||0;
  const x1=a.x+dx*ra, y1=a.y+dy*ra;
  const x2=P.x-dx*back, y2=P.y-dy*back;
  const head = arrow? ` marker-end="url(#arr)"`:'';
  return `<line x1="${x1}" y1="${y1}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="2" stroke-dasharray="6 5"${head}/>`;
}
function arc(center, toward, r, color, label){
  // arco do angulo AGUDO entre a horizontal mais proxima e a direcao center->toward.
  // escolhe a horizontal (+x ou -x) do mesmo lado do toward, para o angulo sair < 90°.
  let ddx = toward.x-center.x, ddy = toward.y-center.y;
  const nn = Math.hypot(ddx,ddy)||1; ddx/=nn; ddy/=nn;
  const hx = ddx>=0 ? 1 : -1;                 // horizontal do mesmo lado da reta
  const x0 = center.x + hx*r, y0 = center.y;
  const exx = center.x + ddx*r, eyy = center.y + ddy*r;
  // varredura (mesma convencao de arc2): sinal do produto vetorial horizontal x toward
  const sweep = (hx*ddy) > 0 ? 1 : 0;
  let s = `<path d="M ${x0} ${y0} A ${r} ${r} 0 0 ${sweep} ${exx.toFixed(1)} ${eyy.toFixed(1)}" fill="none" stroke="${color}" stroke-width="1.6"/>`;
  // label na bissetriz, um pouco fora do arco
  let mdx = (hx+ddx)/2, mdy = ddy/2;
  const mn = Math.hypot(mdx,mdy)||1; mdx/=mn; mdy/=mn;
  s += `<text class="lbl" fill="${color}" x="${(center.x+mdx*(r+26)).toFixed(1)}" y="${(center.y+mdy*(r+26)+4).toFixed(1)}" text-anchor="middle">${label}</text>`;
  return s;
}

function arc2(center, A, Bp, r, color, label){
  // arco entre as direcoes center->A e center->Bp (o angulo de corte), com label na bissetriz
  let ax=A.x-center.x, ay=A.y-center.y; let an=Math.hypot(ax,ay)||1; ax/=an; ay/=an;
  let bx=Bp.x-center.x, by=Bp.y-center.y; let bn=Math.hypot(bx,by)||1; bx/=bn; by/=bn;
  const sx=center.x+ax*r, sy=center.y+ay*r;
  const ex=center.x+bx*r, ey=center.y+by*r;
  // determinar varredura pelo sinal do produto vetorial (menor arco)
  const cross = ax*by - ay*bx;
  const sweep = cross>0 ? 1 : 0;
  let s = `<path d="M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 0 ${sweep} ${ex.toFixed(1)} ${ey.toFixed(1)}" fill="none" stroke="${color}" stroke-width="1.6"/>`;
  // bissetriz
  let mx=ax+bx, my=ay+by; const mn=Math.hypot(mx,my)||1; mx/=mn; my/=mn;
  s += `<text class="lbl" fill="${color}" x="${(center.x+mx*(r+44)).toFixed(1)}" y="${(center.y+my*(r+44)+4).toFixed(1)}" text-anchor="middle">${label}</text>`;
  return s;
}

function defs(){
  return `<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--line2)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--line1)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="axis" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#f0e9d8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .tbl{fill:#f0e9d8;font-size:14px;font-family:inherit;font-weight:600}
      .frac{fill:#cfe8de;font-size:11px;font-family:inherit}
      .lbl{font-size:13px;font-family:inherit}
      .bl{font-size:12px;font-family:inherit;font-weight:600}
      .Atag{font-size:16px;font-weight:700;font-family:inherit}
      .ctag{font-size:13px;font-weight:700;font-family:inherit}
      .axislbl{fill:#f0e9d8;font-size:12px;font-family:inherit;font-weight:600}
      .leg{fill:#f0e9d8;font-size:11px;font-family:inherit}
      .trilbl{font-size:12px;font-family:inherit;font-weight:600}
    </style></defs>`;
}

function render(){
  SVG.innerHTML = defs() + buildStatic() + gridLayer() + axisLayer() + legendLayer() + pocketsLayer() + dynamicLayer();
  attachDrag();
  saveState();
}

// ---- caçapa selector ----
function buildPocketButtons(){
  const box=document.getElementById('pockets');
  box.innerHTML='';
  for(const k of pocketOrder){
    const b=document.createElement('div');
    b.className='pk'+(k===state.target?' on':'');
    b.textContent=pockets[k].label;
    b.onclick=()=>{state.target=k; render(); buildPocketButtons();};
    box.appendChild(b);
  }
}

// ---- drag ----
function svgPoint(evt){
  const pt=SVG.createSVGPoint();
  const t=evt.touches?evt.touches[0]:evt;
  pt.x=t.clientX; pt.y=t.clientY;
  const ctm=SVG.getScreenCTM().inverse();
  const p=pt.matrixTransform(ctm);
  return {x:p.x,y:p.y};
}
let dragging=null;
function attachDrag(){
  SVG.querySelectorAll('.ball').forEach(el=>{
    el.addEventListener('mousedown',startDrag);
    el.addEventListener('touchstart',startDrag,{passive:false});
  });
}
function startDrag(e){
  e.preventDefault();
  dragging=e.currentTarget.getAttribute('data-b');
}
function moveDrag(e){
  if(!dragging) return;
  e.preventDefault();
  const p=svgPoint(e);
  if(dragging==='A'){
    // o ponto A (mira) vive sobre a tabela MAIS PROXIMA do cursor — qualquer uma das 4.
    // assim da para mirar em qualquer direcao, inclusive nas caçapas do meio.
    const dT=Math.abs(p.y-T), dB=Math.abs(p.y-B), dLl=Math.abs(p.x-L), dRr=Math.abs(p.x-R);
    const mn=Math.min(dT,dB,dLl,dRr);
    let ax,ay,rail;
    if(mn===dT){ rail='T'; ay=T; ax=Math.max(L,Math.min(R,p.x)); }
    else if(mn===dB){ rail='B'; ay=B; ax=Math.max(L,Math.min(R,p.x)); }
    else if(mn===dLl){ rail='L'; ax=L; ay=Math.max(T,Math.min(B,p.y)); }
    else { rail='R'; ax=R; ay=Math.max(T,Math.min(B,p.y)); }
    realA={x:ax,y:ay,rail};
    render();
    return;
  }
  // limitar ao feltro
  const x=Math.max(L+BALL,Math.min(R-BALL,p.x));
  const y=Math.max(T+BALL,Math.min(B-BALL,p.y));
  state[dragging]={x,y};
  render();
}
function endDrag(){dragging=null;}
window.addEventListener('mousemove',moveDrag);
window.addEventListener('touchmove',moveDrag,{passive:false});
window.addEventListener('mouseup',endDrag);
window.addEventListener('touchend',endDrag);

// ---- controles ----
['showGhost','showAngles','showGrid','showTri','showCover','show180'].forEach(id=>
  document.getElementById(id).addEventListener('change',render));
// modo tacada real: ao ligar, parte do A ideal atual; ao desligar, esquece o A arrastado
document.getElementById('realShot').addEventListener('change',(e)=>{
  if(e.target.checked){
    const g=compute();           // A ideal atual
    realA={x:g.A.x,y:g.A.y,rail:g.A.rail};
  } else {
    realA=null;
  }
  document.getElementById('realbtns').style.display = e.target.checked?'flex':'none';
  render();
});

// "mira ideal": volta o A para a posicao que encaçapa (mira perfeita)
document.getElementById('btnIdeal').addEventListener('click',()=>{
  const g=compute();
  realA={x:g.A.x,y:g.A.y,rail:g.A.rail};
  render();
});

// "meia bola": ajusta a mira para que o corte real seja ~30° (recobrimento de meia bola),
// escolhendo o lado (esq/dir da objeto) cuja trajetoria real da objeto aponta para a caçapa.
document.getElementById('btnHalf').addEventListener('click',()=>{
  realA = findAforCut(30,3) || realA;   // meia bola = corte real ~30°
  render();
});

// ---- persistencia: lembra posicoes/opcoes para a proxima execucao (arquivo temporario do navegador) ----
const LS_KEY='sinuca_state_v1';
const TOGGLE_IDS=['showGhost','showAngles','showGrid','showCover','realShot','show180','showTri'];
function saveState(){
  try{
    const cfg={obj:state.obj, cue:state.cue, target:state.target, realA, toggles:{}};
    TOGGLE_IDS.forEach(id=>{ const el=document.getElementById(id); if(el) cfg.toggles[id]=el.checked; });
    localStorage.setItem(LS_KEY, JSON.stringify(cfg));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY); if(!raw) return;
    const cfg=JSON.parse(raw);
    if(cfg.obj && cfg.cue && pockets[cfg.target]) state={obj:cfg.obj, cue:cfg.cue, target:cfg.target};
    if(cfg.realA) realA=cfg.realA;
    if(cfg.toggles) TOGGLE_IDS.forEach(id=>{ const el=document.getElementById(id); if(el && id in cfg.toggles) el.checked=cfg.toggles[id]; });
  }catch(e){}
}

loadState();
document.getElementById('realbtns').style.display = document.getElementById('realShot').checked ? 'flex' : 'none';
buildPocketButtons();
render();
</script>
